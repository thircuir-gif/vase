<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vase Silhouette Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="controls">
      <h1>Vase Silhouette Generator</h1>
      <p class="subtitle">Shape your vase profile, color it, and decorate it with simple 3D accents.</p>

      <section>
        <h2>Dimensions</h2>
        <label>Height: <span id="heightValue">20</span>
          <input id="height" type="range" min="8" max="40" step="0.5" value="20" />
        </label>
        <label>Segments: <span id="segmentsValue">6</span>
          <input id="segments" type="range" min="3" max="10" step="1" value="6" />
        </label>
      </section>

      <section>
        <h2>Silhouette points (bottom to top)</h2>
        <div id="profileSliders" class="profile-grid"></div>
      </section>

      <section>
        <h2>Appearance</h2>
        <label>Base color
          <input id="baseColor" type="color" value="#2d89a8" />
        </label>
        <label>Material
          <select id="materialType">
            <option value="standard">Ceramic</option>
            <option value="phong">Glossy</option>
            <option value="toon">Matte toon</option>
          </select>
        </label>
      </section>

      <section>
        <h2>Add accent shape</h2>
        <label>Type
          <select id="shapeType">
            <option value="ring">Ring band</option>
            <option value="sphere">Sphere studs</option>
            <option value="cube">Cube studs</option>
          </select>
        </label>
        <label>Color
          <input id="shapeColor" type="color" value="#f2a541" />
        </label>
        <label>Size: <span id="shapeSizeValue">0.8</span>
          <input id="shapeSize" type="range" min="0.2" max="2" step="0.1" value="0.8" />
        </label>
        <label>Height position: <span id="shapeHeightValue">50</span>%
          <input id="shapeHeight" type="range" min="5" max="95" step="1" value="50" />
        </label>
        <button id="addShape" type="button">Add shape</button>
        <button id="clearShapes" type="button" class="secondary">Clear shapes</button>
      </section>
    </aside>

    <main class="viewport">
      <canvas id="scene"></canvas>
      <div class="hint">Drag to rotate • Scroll to zoom</div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
